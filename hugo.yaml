# ==========================================
# 导航菜单配置
# ==========================================
# 菜单配置
menu:
  # 主导航菜单 (顶部)
  main:
    - identifier: blog # 唯一标识符
      name: 博客 # 菜单显示名称
      url: /categories/blog/ # 链接地址
      weight: 5 # 权重，决定排序，数字越小越靠前
    - identifier: prose # 唯一标识符
      name: Prose # 菜单显示名称
      url: /prose/ # 链接地址
      weight: 10 # 权重，决定排序，数字越小越靠前
    - identifier: about
      name: About
      url: /about/
      weight: 20
    - identifier: categories
      pre: dropdown # 前置属性，在这里主题用来判断并渲染为下拉菜单
      name: Categories
      weight: 30
    - identifier: dropdown
      pre: complexdropdown # 渲染为复杂的图文下拉菜单
      name: Dropdown
      weight: 40
    - identifier: contact
      name: Contact
      url: /contact/
      weight: 50
  
  # 普通分类菜单 (作为 Categories 的下拉子菜单内容)
  categories:
    - identifier: prose
      name: Prose
      url: /prose/
      weight: 10
    - identifier: about
      name: About
      url: /about/
      weight: 20
  
  # 复杂的下拉菜单项 (作为 Dropdown 的下拉内容)
  dropdown:
    - identifier: appearance
      pre: stars # 图标类型：可以是 stars, comments 或 piechart
      name: Appearance
      post: "Easy customization" # 副标题或描述文字
      url: "#"
      weight: 10
    - identifier: comments
      pre: comments
      name: Comments
      post: "Check your latest comments"
      url: "#"
      weight: 20
    - identifier: analytics
      pre: piechart
      name: Analytics
      post: "Take a look at your statistics"
      url: "#"
      weight: 30
  
  # 页脚菜单
  footer:
    - identifier: about
      name: About
      url: /about/
      weight: 10
    - identifier: blog
      name: Blog
      url: /categories/blog/
      weight: 20
    - identifier: news
      name: News
      url: /categories/news/
      weight: 30
    - identifier: prose
      name: Prose
      url: /prose/
      weight: 40
    - identifier: contact
      name: Contact
      url: /contact/
      weight: 50

# 分类法配置
taxonomies:
  category: Categories # 对应Hugo生成分类路由 /categories
  tag: Tags # 对应Hugo生成标签路由 /tags

# 第三方服务隐私与追踪配置
privacy:
  disqus:
    disable: false # 是否禁用Disqus评论系统
  googleAnalytics:
    anonymizeIP: true # 是否对IP进行匿名化处理
    disable: false # 是否禁用Google Analytics
    respectDoNotTrack: false # 是否尊重浏览器的Do Not Track请求
    useSessionStorage: false # 是否使用Session Storage代替Cookie
  instagram:
    disable: false
    simple: false # 是否使用简易模式（不加载JS）
  twitter:
    disable: false
    enableDNT: false
    simple: false
  vimeo:
    disable: false
    enableDNT: false
    simple: false
  youtube:
    disable: false
    privacyEnhanced: true # 是否开启YouTube隐私增强模式 (youtube-nocookie.com)

# Hugo模块与版本要求
module:
  hugoVersion:
    extended: true # 要求使用Hugo Extended版本 (通常TailwindCSS等需要它)
    min: "0.148.2" # 要求的Hugo最低版本号