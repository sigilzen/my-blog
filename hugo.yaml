# 网站基础URL，即你的网站的根域名
baseURL: "https://blog.allinone.us.kg/"
# 网站标题
title: xxj的All in One
# 默认语言代码，zh-cn代表简体中文
languageCode: zh-cn
# 使用的Hugo主题名称
theme: tailbliss
# 默认内容语言
DefaultContentLanguage: zh-cn
# 是否启用Emoji表情支持
enableEmoji: true
# 是否启用Git信息（如最后修改时间等，需要本地是一个git仓库）
enableGitInfo: false
# 是否生成robots.txt文件，用于告诉搜索引擎爬虫哪些页面可以抓取
enableRobotsTXT: true
# 是否将相对URL转换为绝对URL
canonifyURLs: false
# 分页配置
pagination:
  # 每页显示的文章数量
  pagerSize: 9
# 暗黑模式的JS脚本配置
darkmode_js:
  - assets/js/darkmode.js
# 是否允许在Markdown中使用内联短代码 (Shortcodes)
enableInlineShortcodes: true

# Markdown解析器配置
markup:
  # 使用Goldmark作为Markdown解析器
  goldmark:
    extensions:
      definitionList: true # 启用定义列表
      footnote: true       # 启用脚注
      linkify: true        # 自动将URL转换为链接
      linkifyProtocol: https # 自动链接使用的协议
      strikethrough: true  # 启用删除线
      table: true          # 启用表格
      taskList: true       # 启用任务列表
      typographer:         # 排版优化配置
        apostrophe: '&rsquo;'
        disable: false     # 是否禁用排版优化
        ellipsis: '&hellip;' # 省略号
        emDash: '&mdash;'  # 破折号
        enDash: '&ndash;'  # 连接号
        leftAngleQuote: '&laquo;'
        leftDoubleQuote: '&ldquo;'
        leftSingleQuote: '&lsquo;'
        rightAngleQuote: '&raquo;'
        rightDoubleQuote: '&rdquo;'
        rightSingleQuote: '&rsquo;'
    parser:
      attribute:
        block: false       # 是否允许块级属性
        title: true        # 是否允许标题属性
      autoHeadingID: true  # 自动为标题生成ID
      autoHeadingIDType: github # 自动生成的ID格式，采用github风格
      wrapStandAloneImageWithinParagraph: true # 是否将独立图片包裹在段落中
    renderer:
      hardWraps: false     # 是否将Markdown中的换行转换为<br>
      unsafe: true         # 是否允许在Markdown中直接使用HTML标签（设为true才支持内嵌HTML代码，如视频iframe等）
      xhtml: false         # 是否渲染为XHTML

# 主题自定义参数
params:
