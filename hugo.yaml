  authorimage: ../assets/images/global/author.webp # 作者头像路径
  og_image: images/火箭起飞.png # Open Graph 默认分享图片，用于社交媒体卡片
  moto: "人的一生全靠奋斗，唯有奋斗才能成功！" # 网站座右铭/格言
  description: "记录工作、学习和生活的点点滴滴！" # 网站描述 (SEO)
  disable_theme_toggle: false # 是否禁用右上角的 暗黑/白天 模式切换按钮
  disable_stay_uptodate: true # 是否禁用“保持更新/邮件订阅”模块

