<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 霓虹打砖块 - Neon Breaker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  #gameWrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #topBar {
    width: 800px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    background: linear-gradient(135deg, rgba(20,20,60,0.9), rgba(40,20,80,0.9));
    border-radius: 15px 15px 0 0;
    border: 1px solid rgba(100,100,255,0.3);
    border-bottom: none;
  }

  .stat {
    color: #fff;
    font-size: 16px;
    text-shadow: 0 0 10px rgba(100,150,255,0.8);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat .label { color: #88aaff; font-size: 13px; }
  .stat .value { font-weight: bold; font-size: 20px; }

  #livesDisplay span {
    display: inline-block;
    width: 14px; height: 14px;
    background: radial-gradient(circle, #ff6b9d, #c44569);
    border-radius: 50%;
    margin-right: 4px;
    box-shadow: 0 0 8px rgba(255,107,157,0.6);
  }

  canvas {
    display: block;
    background: #0d0d2b;
    border: 1px solid rgba(100,100,255,0.3);
    border-top: none;
    border-radius: 0 0 15px 15px;
  }

  #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 800px; height: calc(100% + 54px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
    pointer-events: none;
  }

  #overlay.active { pointer-events: all; }

  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 40px;
    background: radial-gradient(ellipse at center, rgba(20,20,80,0.95), rgba(10,10,40,0.97));
    border-radius: 20px;
    border: 2px solid rgba(100,150,255,0.4);
    box-shadow: 0 0 60px rgba(80,100,255,0.3), inset 0 0 60px rgba(80,100,255,0.1);
    max-width: 500px;
  }

  .screen.show { display: flex; }

  .screen h1 {
    font-size: 42px;
    background: linear-gradient(135deg, #00d2ff, #7b2ff7, #ff6b9d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
    filter: drop-shadow(0 0 20px rgba(100,150,255,0.5));

    font-size: 28px;

    bottom: 10px;

  .controls-hint {
    color: #667;

    margin-top: 15px;

  #levelTransition {

    top: 0; left: 0;
    width: 800px; height: calc(100% + 54px);

<script>
// ==================== AUDIO ENGINE ====================
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.masterGain = null;
    this.enabled = true;
    this.bgmOscillators = [];
    this.bgmPlaying = false;
  }

  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = 0.3;
    this.masterGain.connect(this.ctx.destination);
  }

  playTone(freq, duration, type = 'square', volume = 0.15, detune = 0) {
    if (!this.ctx || !this.enabled) return;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    osc.detune.value = detune;
    gain.gain.setValueAtTime(volume, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(this.masterGain);
    osc.start();
    osc.stop(this.ctx.currentTime + duration);
  }

  playHit() {
    const freq = 400 + Math.random() * 300;
    this.playTone(freq, 0.1, 'square', 0.12);
    this.playTone(freq * 1.5, 0.08, 'triangle', 0.06);
  }

  playPowerup() {
    [523, 659, 784, 1047].forEach((f, i) => {
      setTimeout(() => this.playTone(f, 0.2, 'sine', 0.1), i * 80);
    });
  }

  playLifeLost() {
    [400, 350, 300, 200].forEach((f, i) => {
      setTimeout(() => this.playTone(f, 0.3, 'sawtooth', 0.1), i * 120);
    });
  }

  playLevelUp() {
    const notes = [523, 659, 784, 1047, 1319];
    notes.forEach((f, i) => {
      setTimeout(() => {
        this.playTone(f, 0.3, 'sine', 0.12);
        this.playTone(f * 0.5, 0.3, 'triangle', 0.06);
      }, i * 100);
    });
  }

  playCombo(combo) {
    const baseFreq = 300 + combo * 40;
    this.playTone(baseFreq, 0.15, 'square', 0.1);
    this.playTone(baseFreq * 1.25, 0.1, 'triangle', 0.08);
  }

  playBallBounce() {
    this.playTone(600 + Math.random() * 200, 0.05, 'sine', 0.06);
  }

  playPaddleHit(angle) {
    const freq = 300 + (angle / Math.PI) * 400;
    this.playTone(freq, 0.12, 'triangle', 0.1);
  }

  playExplosion() {
    if (!this.ctx || !this.enabled) return;
    const bufferSize = this.ctx.sampleRate * 0.3;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
    }
    const source = this.ctx.createBufferSource();
    source.buffer = buffer;
    const gain = this.ctx.createGain();
    gain.gain.value = 0.15;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 800;
    source.connect(filter);
    filter.connect(gain);
    gain.connect(this.masterGain);
    source.start();
  }

  playLaser() {
    if (!this.ctx || !this.enabled) return;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(1200, this.ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(200, this.ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.15);
    osc.connect(gain);
    gain.connect(this.masterGain);
    osc.start();
    osc.stop(this.ctx.currentTime + 0.15);
  }

  startBGM() {
    if (!this.ctx || this.bgmPlaying) return;
    this.bgmPlaying = true;
    this._bgmLoop();
  }

  _bgmLoop() {
    if (!this.bgmPlaying) return;
    const melody = [261, 329, 392, 523, 392, 329];
    let noteIndex = 0;

    const playNote = () => {
      if (!this.bgmPlaying) return;
      this.playTone(melody[noteIndex % melody.length], 0.15, 'sine', 0.03);
      noteIndex++;
      setTimeout(playNote, 250);
    };
    playNote();

    // Bass line
    const bassNotes = [65, 82, 98, 130];
    let bassIdx = 0;
    const playBass = () => {
      if (!this.bgmPlaying) return;
      this.playTone(bassNotes[bassIdx % bassNotes.length], 0.4, 'triangle', 0.02);
      bassIdx++;
      setTimeout(playBass, 500);
    };
    playBass();
  }

  stopBGM() {
    this.bgmPlaying = false;
  }
}

const audio = new AudioEngine();

// ==================== PARTICLE SYSTEM ====================
class Particle {
  constructor(x, y, color, vx, vy, life, size) {
    this.x = x; this.y = y;
    this.color = color;
    this.vx = vx; this.vy = vy;
    this.life = life;
    this.maxLife = life;
    this.size = size;
    this.trail = [];
  }

  update(dt) {
    this.trail.push({ x: this.x, y: this.y, alpha: 1 });
    if (this.trail.length > 5) this.trail.shift();
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.vy += 200 * dt; // gravity
    this.life -= dt;
  }

  draw(ctx) {
    const alpha = Math.max(0, this.life / this.maxLife);
    // Draw trail
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      ctx.globalAlpha = alpha * 0.3 * (i / this.trail.length);
      ctx.fillStyle = this.color;
      const s = this.size * 0.5 * (i / this.trail.length);
      ctx.fillRect(t.x - s/2, t.y - s/2, s, s);
    }
    // Draw particle
    ctx.globalAlpha = alpha;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 10;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  isDead() { return this.life <= 0; }
}

class ParticleSystem {
  constructor() {
    this.particles = [];
  }

  emit(x, y, color, count = 20, speed = 200, life = 1, size = 4) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd = Math.random() * speed + speed * 0.3;
      this.particles.push(new Particle(
        x, y, color,
        Math.cos(angle) * spd,
        Math.sin(angle) * spd - 50,
        life + Math.random() * 0.5,
        size * (0.5 + Math.random())
      ));
    }
  }

  emitExplosion(x, y, color1, color2) {
    this.emit(x, y, color1, 30, 300, 1.2, 5);
    this.emit(x, y, color2, 20, 200, 0.8, 3);
    this.emit(x, y, '#fff', 10, 400, 0.5, 6);
    audio.playExplosion();
  }

  emitPowerup(x, y) {
    const colors = ['#ffd700', '#ff6bff', '#00ffff'];
    for (let i = 0; i < 3; i++) {
      setTimeout(() => this.emit(x, y, colors[i], 15, 150, 0.8, 4), i * 100);
    }
  }

  update(dt) {
    this.particles.forEach(p => p.update(dt));
    this.particles = this.particles.filter(p => !p.isDead());
  }

  draw(ctx) {
    this.particles.forEach(p => p.draw(ctx));
  }

  clear() {
    this.particles = [];
  }
}

const particles = new ParticleSystem();

// ==================== GAME STATE ====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameState = 'menu'; // menu, playing, paused, gameover, win, levelTransition
let score = 0;
let highScore = parseInt(localStorage.getItem('neonBreakerHigh') || '0');
let lives = 3;
let currentLevel = 1;
let combo = 0;
let maxCombo = 0;
let screenShake = { x: 0, y: 0, intensity: 0 };

// Paddle
const paddle = {
  x: 400, y: 490, width: 100, height: 12,
  speed: 8, targetX: 400,
  baseWidth: 100, color: '#667eea',
  glowColor: 'rgba(102,126,234,0.5)'
};

// Balls
let balls = [];
const BASE_BALL_SPEED = 5;

// Bricks
let bricks = [];

// Powerups
let powerups = [];
const POWERUP_TYPES = [
  { type: 'wide', emoji: '↔️', color: '#4facfe', desc: '加宽挡板' },
  { type: 'multi', emoji: '🎱', color: '#f093fb', desc: '多球' },
  { type: 'life', emoji: '❤️', color: '#ff6b6b', desc: '额外生命' },
  { type: 'slow', emoji: '🐌', color: '#ffd700', desc: '减速球' },
  { type: 'laser', emoji: '🔫', color: '#ff4444', desc: '激光射击' },
  { type: 'magnet', emoji: '🧲', color: '#aa88ff', desc: '磁力吸附' },
];

// Active powerups
let activePowerups = { wide: false, multi: false, slow: false, laser: false, magnet: false };
let powerupTimers = {};

// Lasers
let lasers = [];

// Obstacles (for level 3)
let obstacles = [];

// Animation
let lastTime = 0;
let animFrame = 0;
let ballLaunchTimer = 2;
let isPaused = false;

// Stars background
const stars = [];
for (let i = 0; i < 80; i++) {
  stars.push({
    x: Math.random() * 800,
    y: Math.random() * 520,
    size: Math.random() * 2 + 0.5,
    twinkle: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.5 + 0.3
  });
}

// ==================== LEVEL DEFINITIONS ====================
const levelNames = ['', '初出茅庐', '渐入佳境', '迷宫挑战', '极速风暴', '终极决战'];
const levelDescs = [
  '', '基础砖块，热身一下！', '出现铁砖，需要多次击打！', '小心障碍物挡路！', '球速加快，注意反应！', '最强挑战，你能行吗？'
];

const BRICK_COLORS = {
  row1: '#ff6b6b',
  row2: '#ffa502',
  row3: '#ffd700',
  row4: '#7bed9f',
  row5: '#4facfe',
  row6: '#a55eea',
  row7: '#ff6bff',
};

function getBrickColor(row, totalRows) {
  const colors = Object.values(BRICK_COLORS);
  return colors[row % colors.length];
}

function createLevel(levelNum) {
  bricks = [];
  obstacles = [];
  powerups = [];
  lasers = [];
  activePowerups = {};
  powerupTimers = {};
  particles.clear();

  const brickW = 72;
  const brickH = 22;
  const padding = 6;
  const offsetX = (800 - (brickW + padding) * 10 + padding) / 2;

  switch(levelNum) {
    case 1: // Basic level
      for (let r = 0; r < 5; r++) {
        for (let c = 0; c < 10; c++) {
          bricks.push({
            x: offsetX + c * (brickW + padding),
            y: 60 + r * (brickH + padding),
            w: brickW, h: brickH,
            hp: 1, maxHp: 1,
            color: getBrickColor(r, 5),
            glow: true,
            shakeTimer: 0
          });
        }
      }
      break;

    case 2: // Iron bricks
      for (let r = 0; r < 6; r++) {
        for (let c = 0; c < 10; c++) {
          const hp = (r < 2) ? 3 : (r < 4) ? 2 : 1;
          bricks.push({
            x: offsetX + c * (brickW + padding),
            y: 60 + r * (brickH + padding),
            w: brickW, h: brickH,
            hp: hp, maxHp: hp,
            color: getBrickColor(r, 6),
            glow: true,
            shakeTimer: 0
          });
        }
      }
      break;

    case 3: // Maze with obstacles
      for (let r = 0; r < 5; r++) {
        for (let c = 0; c < 10; c++) {
          if ((r === 2 && c % 3 === 0) || (r === 3 && c % 4 === 0)) continue; // gaps
          bricks.push({
            x: offsetX + c * (brickW + padding),
            y: 60 + r * (brickH + padding),
            w: brickW, h: brickH,
            hp: 1, maxHp: 1,
            color: getBrickColor(r, 5),
            glow: true,
            shakeTimer: 0
          });
        }
      }
      // Obstacles - pillars in the middle
      obstacles.push({ x: 300, y: 280, w: 20, h: 120, color: '#556' });
      obstacles.push({ x: 480, y: 280, w: 20, h: 120, color: '#556' });
      break;

    case 4: // Fast level - more bricks
      for (let r = 0; r < 7; r++) {
        for (let c = 0; c < 10; c++) {
          if (r === 3 && c >= 3 && c <= 6) continue; // arch gap
          const hp = (r < 2) ? 2 : 1;
          bricks.push({
            x: offsetX + c * (brickW + padding),
            y: 60 + r * (brickH + padding),
            w: brickW, h: brickH,
            hp: hp, maxHp: hp,
            color: getBrickColor(r, 7),
            glow: true,
            shakeTimer: 0
          });
        }
      }
      break;

    case 5: // Final boss level - complex pattern
      for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 10; c++) {
          const hp = (r < 2) ? 4 : (r < 4) ? 2 : 1;
          // Diamond pattern gaps
          if (r === 3 && (c < 2 || c > 7)) continue;
          if (r === 4 && (c < 3 || c > 6)) continue;
          bricks.push({
            x: offsetX + c * (brickW + padding),
            y: 50 + r * (brickH + padding),
            w: brickW, h: brickH,
            hp: hp, maxHp: hp,
            color: getBrickColor(r, 8),
            glow: true,
            shakeTimer: 0
          });
        }
      }
      // Some obstacles
      obstacles.push({ x: 150, y: 320, w: 16, h: 100, color: '#445' });
      obstacles.push({ x: 634, y: 320, w: 16, h: 100, color: '#445' });
      break;
  }

  // Reset ball and paddle
  balls = [{
    x: 400, y: 470, r: 8,
    vx: (Math.random() > 0.5 ? 1 : -1) * BASE_BALL_SPEED * (levelNum === 4 ? 1.3 : levelNum === 5 ? 1.5 : 1),
    vy: -BASE_BALL_SPEED * (levelNum === 4 ? 1.3 : levelNum === 5 ? 1.5 : 1),
    speed: BASE_BALL_SPEED * (levelNum === 4 ? 1.3 : levelNum === 5 ? 1.5 : 1),
    color: '#fff',
    trail: [],
    stuck: true,
    glowIntensity: 0
  }];

  paddle.width = paddle.baseWidth;
  paddle.x = 400;
}

// ==================== GAME FUNCTIONS ====================
function startGame() {
  audio.init();
  hideAllScreens();
  score = 0;
  lives = 3;
  currentLevel = 1;
  combo = 0;
  maxCombo = 0;
  updateUI();
  showLevelTransition(currentLevel, () => {
    createLevel(currentLevel);
    gameState = 'playing';
    audio.startBGM();
  });
}

function restartGame() {
  hideAllScreens();
  startGame();
}

function hideAllScreens() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('show'));
  document.getElementById('overlay').classList.remove('active');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('show'));
  document.getElementById(id).classList.add('show');
  document.getElementById('overlay').classList.add('active');
}

function showLevelTransition(level, callback) {
  gameState = 'levelTransition';
  const el = document.getElementById('levelTransition');
  document.getElementById('lvlAnnounceText').textContent = `第 ${level} 关`;
  document.getElementById('lvlAnnounceSub').textContent = levelNames[level] + ' - ' + levelDescs[level];
  el.classList.add('show');

  // Reset animation
  const announceEl = el.querySelector('.level-announce');
  announceEl.style.animation = 'none';
  announceEl.offsetHeight; // reflow
  announceEl.style.animation = '';

  setTimeout(() => {
    el.classList.remove('show');
    if (callback) callback();
  }, 2500);
}

function updateUI() {
  document.getElementById('levelDisplay').textContent = currentLevel;
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('highScoreDisplay').textContent = highScore;
  document.getElementById('comboDisplay').textContent = combo > 1 ? `x${combo}` : 'x1';

  const livesEl = document.getElementById('livesDisplay');
  livesEl.innerHTML = '';
  for (let i = 0; i < lives; i++) {
    livesEl.innerHTML += '<span></span>';
  }

  // Powerup indicators
  const indicator = document.getElementById('powerupIndicator');
  indicator.innerHTML = '';
  for (const [key, active] of Object.entries(activePowerups)) {
    if (!active) continue;
    const pDef = POWERUP_TYPES.find(p => p.type === key);
    if (pDef) {
      const el = document.createElement('div');
      el.className = 'powerup-icon';
      el.style.background = pDef.color + '44';
      el.style.border = `1px solid ${pDef.color}`;
      el.textContent = pDef.emoji;
      indicator.appendChild(el);
    }
  }

  if (score > highScore) {
    highScore = score;
    localStorage.setItem('neonBreakerHigh', highScore.toString());
  }
}

function togglePause() {
  if (gameState !== 'playing' && gameState !== 'paused') return;
  isPaused = !isPaused;
  if (isPaused) {
    gameState = 'paused';
    showScreen('pauseScreen');
    audio.stopBGM();
  } else {
    hideAllScreens();
    gameState = 'playing';
    audio.startBGM();
  }
}

// ==================== INPUT HANDLING ====================
let keysDown = {};
let mouseX = 400;
let useMouseControl = false;

document.addEventListener('keydown', (e) => {
  keysDown[e.key] = true;
  if (e.key === 'p' || e.key === 'P') togglePause();
  if (e.key === ' ') {
    e.preventDefault();
    launchBall();
  }
});

document.addEventListener('keyup', (e) => {
  keysDown[e.key] = false;
});

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (800 / rect.width);
  useMouseControl = true;
});

canvas.addEventListener('click', () => {
  launchBall();
});

function launchBall() {
  balls.forEach(ball => {
    if (ball.stuck) {
      ball.stuck = false;
      const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.8;
      ball.vx = Math.cos(angle) * ball.speed;
      ball.vy = Math.sin(angle) * ball.speed;
    }
  });
}

// ==================== COLLISION DETECTION ====================
function circleRectCollision(cx, cy, cr, rx, ry, rw, rh) {
  const closestX = Math.max(rx, Math.min(cx, rx + rw));
  const closestY = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - closestX;
  const dy = cy - closestY;
  return (dx * dx + dy * dy) < (cr * cr);
}

// ==================== UPDATE LOGIC ====================
function update(dt) {
  if (gameState !== 'playing') return;

  animFrame++;

  // Screen shake decay
  screenShake.intensity *= 0.9;
  screenShake.x = (Math.random() - 0.5) * screenShake.intensity;
  screenShake.y = (Math.random() - 0.5) * screenShake.intensity;

  // Paddle movement
  if (useMouseControl) {
    paddle.targetX = mouseX;
  } else {
    if (keysDown['ArrowLeft'] || keysDown['a']) paddle.targetX -= paddle.speed;
    if (keysDown['ArrowRight'] || keysDown['d']) paddle.targetX += paddle.speed;
  }

  // Smooth paddle movement
  const dx = paddle.targetX - paddle.x;
  paddle.x += dx * 0.25;
  paddle.x = Math.max(paddle.width / 2, Math.min(800 - paddle.width / 2, paddle.x));

  // Powerup timers
  for (const [key, timer] of Object.entries(powerupTimers)) {
    if (timer) {
      powerupTimers[key] -= dt;
      if (powerupTimers[key] <= 0) {
        activePowerups[key] = false;
        powerupTimers[key] = null;
        if (key === 'wide') paddle.width = paddle.baseWidth;
        updateUI();
      }
    }
  }

  // Update balls
  for (let bi = balls.length - 1; bi >= 0; bi--) {
    const ball = balls[bi];

    if (ball.stuck) {
      ball.x = paddle.x;
      ball.y = paddle.y - ball.r - paddle.height / 2;
      continue;
    }

    // Ball trail
    ball.trail.push({ x: ball.x, y: ball.y });
    if (ball.trail.length > 12) ball.trail.shift();

    // Apply speed modifiers
    let currentSpeed = ball.speed;
    if (activePowerups.slow) currentSpeed *= 0.6;

    const speedRatio = currentSpeed / ball.speed;
    const nvx = ball.vx * speedRatio / Math.abs(ball.vx || 1);
    const nvy = ball.vy * speedRatio / Math.abs(ball.vy || 1);

    // Move ball step by step for accurate collision
    const steps = 4;
    const stepDt = 1 / steps;

    for (let s = 0; s < steps; s++) {
      ball.x += nvx * stepDt;
      ball.y += nvy * stepDt;

      // Wall collisions
      if (ball.x - ball.r <= 0) {
        ball.x = ball.r;
        ball.vx = Math.abs(ball.vx);
        audio.playBallBounce();
      }
      if (ball.x + ball.r >= 800) {
        ball.x = 800 - ball.r;
        ball.vx = -Math.abs(ball.vx);
        audio.playBallBounce();
      }
      if (ball.y - ball.r <= 0) {
        ball.y = ball.r;
        ball.vy = Math.abs(ball.vy);
        audio.playBallBounce();
      }

      // Bottom - lose ball
      if (ball.y + ball.r > 520) {
        balls.splice(bi, 1);
        combo = 0;
        updateUI();

        if (balls.length === 0) {
          lives--;
          updateUI();
          audio.playLifeLost();
          screenShake.intensity = 15;

          if (lives <= 0) {
            gameState = 'gameover';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalLevel').textContent = `第 ${currentLevel} 关`;
            setTimeout(() => showScreen('gameOverScreen'), 500);
            audio.stopBGM();
          } else {
            // Respawn ball
            balls.push({
              x: paddle.x, y: paddle.y - 20, r: 8,
              vx: (Math.random() > 0.5 ? 1 : -1) * BASE_BALL_SPEED,
              vy: -BASE_BALL_SPEED,
              speed: BASE_BALL_SPEED,
              color: '#fff',
              trail: [],
              stuck: true,
              glowIntensity: 0
            });
          }
        }
        return;
      }

      // Paddle collision
      const pLeft = paddle.x - paddle.width / 2;
      const pTop = paddle.y - paddle.height / 2;
      if (circleRectCollision(ball.x, ball.y, ball.r, pLeft, pTop, paddle.width, paddle.height)) {
        if (ball.vy > 0) { // Only when going down
          ball.y = pTop - ball.r;

          // Calculate bounce angle based on hit position
          const hitPos = (ball.x - paddle.x) / (paddle.width / 2);
          const maxAngle = Math.PI * 0.4;
          const angle = -Math.PI / 2 + hitPos * maxAngle;

          ball.vx = Math.cos(angle) * ball.speed;
          ball.vy = Math.sin(angle) * ball.speed;

          audio.playPaddleHit(Math.abs(hitPos));

          // Particle effect on paddle hit
          particles.emit(ball.x, ball.y, '#667eea', 8, 100, 0.4, 3);

          // Magnet powerup - attract ball to center angle
          if (activePowerups.magnet) {
            const centerAngle = Math.atan2(paddle.y - ball.y, paddle.x - ball.x);
            ball.vx += Math.cos(centerAngle) * 0.5;
            ball.vy += Math.sin(centerAngle) * 0.5;
          }
        }
      }

      // Brick collisions
      for (let bri = bricks.length - 1; bri >= 0; bri--) {
        const brick = bricks[bri];
        if (!brick || brick.hp <= 0) continue;

        if (circleRectCollision(ball.x, ball.y, ball.r, brick.x, brick.y, brick.w, brick.h)) {
          // Determine bounce direction
          const ballCenterX = ball.x;
          const ballCenterY = ball.y;
          const brickCenterX = brick.x + brick.w / 2;
          const brickCenterY = brick.y + brick.h / 2;

          const overlapLeft = (brick.x + brick.w) - ballCenterX;
          const overlapRight = ballCenterX - brick.x;
          const overlapTop = (brick.y + brick.h) - ballCenterY;
          const overlapBottom = ballCenterY - brick.y;

          const minOverlapX = Math.min(overlapLeft, overlapRight);
          const minOverlapY = Math.min(overlapTop, overlapBottom);

          if (minOverlapX < minOverlapY) {
            ball.vx = -ball.vx;
          } else {
            ball.vy = -ball.vy;
          }

          brick.hp--;
          brick.shakeTimer = 0.15;

          if (brick.hp <= 0) {
            combo++;
            if (combo > maxCombo) maxCombo = combo;

            const basePoints = 10 * currentLevel;
            const comboMultiplier = Math.min(combo, 10);
            score += basePoints * comboMultiplier;

            // Particle explosion
            particles.emitExplosion(
              brick.x + brick.w / 2,
              brick.y + brick.h / 2,
              brick.color, '#fff'
            );

            screenShake.intensity = Math.min(8, 3 + combo * 0.5);

            audio.playHit();
            if (combo > 1) audio.playCombo(combo);

            // Show combo text
            if (combo >= 3) {
              showComboText(brick.x + brick.w / 2, brick.y, `${combo}x COMBO!`);
            }

            // Drop powerup chance
            if (Math.random() < 0.15 || currentLevel === 1 && Math.random() < 0.2) {
              spawnPowerup(brick.x + brick.w / 2, brick.y + brick.h / 2);
            }

            bricks.splice(bri, 1);
          } else {
            // Brick damaged but not destroyed
            particles.emit(
              ball.x, ball.y,
              brick.color, 5, 80, 0.3, 2
            );
            audio.playHit();
          }

          updateUI();
          break; // Only hit one brick per substep
        }
      }

      // Obstacle collisions
      for (const obs of obstacles) {
        if (circleRectCollision(ball.x, ball.y, ball.r, obs.x, obs.y, obs.w, obs.h)) {
          const ballCenterX = ball.x;
          const ballCenterY = ball.y;
          const obsCenterX = obs.x + obs.w / 2;
          const obsCenterY = obs.y + obs.h / 2;

          if (Math.abs(ballCenterX - obsCenterX) > Math.abs(ballCenterY - obsCenterY)) {
            ball.vx = -ball.vx;
          } else {
            ball.vy = -ball.vy;
          }
          audio.playBallBounce();
          particles.emit(ball.x, ball.y, '#888', 5, 60, 0.3, 2);
        }
      }
    }

    // Laser powerup auto-fire
    if (activePowerups.laser && animFrame % 15 === 0) {
      lasers.push({
        x: paddle.x - paddle.width / 4, y: paddle.y - paddle.height / 2,
        vy: -8, w: 3, h: 12
      });
      lasers.push({
        x: paddle.x + paddle.width / 4, y: paddle.y - paddle.height / 2,
        vy: -8, w: 3, h: 12
      });
      audio.playLaser();
    }
  }

  // Update lasers
  for (let li = lasers.length - 1; li >= 0; li--) {
    const laser = lasers[li];
    laser.y += laser.vy;

    if (laser.y < 0) {
      lasers.splice(li, 1);
      continue;
    }

    // Laser-brick collision
    for (let bri = bricks.length - 1; bri >= 0; bri--) {
      const brick = bricks[bri];
      if (!brick || brick.hp <= 0) continue;

      if (laser.x > brick.x && laser.x < brick.x + brick.w &&
          laser.y > brick.y && laser.y < brick.y + brick.h) {
        brick.hp--;
        if (brick.hp <= 0) {
          score += 10 * currentLevel;
          particles.emitExplosion(brick.x + brick.w / 2, brick.y + brick.h / 2, brick.color, '#fff');
          bricks.splice(bri, 1);
          updateUI();
        } else {
          particles.emit(laser.x, laser.y, brick.color, 5, 60, 0.3, 2);
        }
        lasers.splice(li, 1);
        audio.playHit();
        break;
      }
    }
  }

  // Update powerups
  for (let pi = powerups.length - 1; pi >= 0; pi--) {
    const pu = powerups[pi];
    pu.y += 2;
    pu.bobPhase += dt * 4;

    // Check paddle collection
    if (pu.y + 15 > paddle.y - paddle.height / 2 &&
        pu.y - 15 < paddle.y + paddle.height / 2 &&
        pu.x > paddle.x - paddle.width / 2 &&
        pu.x < paddle.x + paddle.width / 2) {

      // Apply powerup
      applyPowerup(pu.type);
      audio.playPowerup();
      particles.emitPowerup(pu.x, pu.y);
      powerups.splice(pi, 1);
      updateUI();
      continue;
    }

    if (pu.y > 530) {
      powerups.splice(pi, 1);
    }
  }

  // Update particles
  particles.update(dt);

  // Check level complete
  if (bricks.length === 0 && gameState === 'playing') {
    if (currentLevel >= 5) {
      // Win!
      gameState = 'win';
      document.getElementById('winScore').textContent = score;
      setTimeout(() => showScreen('winScreen'), 1000);
      audio.stopBGM();
      audio.playLevelUp();
    } else {
      currentLevel++;
      updateUI();
      showLevelTransition(currentLevel, () => {
        createLevel(currentLevel);
        gameState = 'playing';
      });
      audio.playLevelUp();
    }
  }
}

function applyPowerup(type) {
  switch(type) {
    case 'wide':
      paddle.width = Math.min(paddle.baseWidth * 2, 200);
      activePowerups.wide = true;
      powerupTimers.wide = 15;
      break;
    case 'multi':
      const newBalls = [];
      balls.forEach(b => {
        if (!b.stuck) {
          for (let i = 0; i < 2; i++) {
            const angle = -Math.PI/2 + (i === 0 ? -0.4 : 0.4);
            newBalls.push({
              x: b.x, y: b.y, r: 6,
              vx: Math.cos(angle) * b.speed,
              vy: Math.sin(angle) * b.speed,
              speed: b.speed,
              color: '#f093fb',
              trail: [],
              stuck: false,
              glowIntensity: 1
            });
          }
        }
      });
      balls = balls.concat(newBalls);
      break;
    case 'life':
      lives++;
      updateUI();
      break;
    case 'slow':
      activePowerups.slow = true;
      powerupTimers.slow = 12;
      break;
    case 'laser':
      activePowerups.laser = true;
      powerupTimers.laser = 10;
      break;
    case 'magnet':
      activePowerups.magnet = true;
      powerupTimers.magnet = 12;
      break;
  }
}

function spawnPowerup(x, y) {
  const typeDef = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
  powerups.push({
    x: x, y: y,
    type: typeDef.type,
    emoji: typeDef.emoji,
    color: typeDef.color,
    bobPhase: 0,
    size: 14
  });
}

function showComboText(x, y, text) {
  const el = document.createElement('div');
  el.className = 'combo-text';
  el.textContent = text;
  el.style.left = (x + (screenShake.x || 0)) + 'px';
  el.style.top = (y + (screenShake.y || 0) - 54) + 'px';
  document.getElementById('gameWrapper').appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

// ==================== RENDERING ====================
function drawBackground() {
  // Dark gradient background
  const grad = ctx.createRadialGradient(400, 260, 50, 400, 260, 500);
  grad.addColorStop(0, '#1a1a3e');
  grad.addColorStop(1, '#0d0d2b');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 800, 520);

  // Stars
  stars.forEach(star => {
    star.twinkle += star.speed * 0.02;
    const alpha = 0.3 + Math.sin(star.twinkle) * 0.3;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#aabbff';
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Grid lines (subtle)
  ctx.strokeStyle = 'rgba(60,60,120,0.15)';
  ctx.lineWidth = 1;
  for (let x = 0; x < 800; x += 40) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, 520);
    ctx.stroke();
  }
  for (let y = 0; y < 520; y += 40) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(800, y);
    ctx.stroke();
  }
}

function drawPaddle() {
  const px = paddle.x - paddle.width / 2;
  const py = paddle.y - paddle.height / 2;

  // Glow effect
  ctx.shadowColor = activePowerups.laser ? '#ff4444' : (activePowerups.wide ? '#4facfe' : '#667eea');
  ctx.shadowBlur = 20;

  // Main paddle body
  const grad = ctx.createLinearGradient(px, py, px + paddle.width, py);
  if (activePowerups.laser) {
    grad.addColorStop(0, '#ff4444');
    grad.addColorStop(0.5, '#ff6b6b');
    grad.addColorStop(1, '#ff4444');
  } else if (activePowerups.wide) {
    grad.addColorStop(0, '#2196f3');
    grad.addColorStop(0.5, '#4facfe');
    grad.addColorStop(1, '#2196f3');
  } else {
    grad.addColorStop(0, '#5a67d8');
    grad.addColorStop(0.5, '#667eea');
    grad.addColorStop(1, '#5a67d8');
  }

  ctx.fillStyle = grad;
  roundRect(ctx, px, py, paddle.width, paddle.height, 6);
  ctx.fill();

  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  roundRect(ctx, px + 4, py + 2, paddle.width - 8, paddle.height / 2, 4);
  ctx.fill();

  ctx.shadowBlur = 0;
}

function drawBall(ball) {
  // Trail
  for (let i = 0; i < ball.trail.length; i++) {
    const t = ball.trail[i];
    const alpha = (i / ball.trail.length) * 0.4;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = ball.color;
    const size = ball.r * (i / ball.trail.length);
    ctx.beginPath();
    ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Glow
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 15 + ball.glowIntensity * 10;

  // Ball body
  const grad = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 0, ball.x, ball.y, ball.r);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(0.6, ball.color === '#f093fb' ? '#ff88dd' : '#ddeeff');
  grad.addColorStop(1, ball.color === '#f093fb' ? '#aa44aa' : '#88aacc');

  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();

  // Inner highlight
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath();
  ctx.arc(ball.x - 2, ball.y - 2, ball.r * 0.4, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowBlur = 0;
}

function drawBrick(brick) {
  if (brick.shakeTimer > 0) {
    brick.shakeTimer -= 0.016;
    const shakeX = (Math.random() - 0.5) * 3;
    const shakeY = (Math.random() - 0.5) * 3;
    ctx.save();
    ctx.translate(shakeX, shakeY);
  }

  // Brick glow
  ctx.shadowColor = brick.color;
  ctx.shadowBlur = brick.glow ? 8 : 0;

  const alpha = 0.4 + (brick.hp / brick.maxHp) * 0.6;
  ctx.globalAlpha = Math.min(1, alpha);

  // Brick body
  const grad = ctx.createLinearGradient(brick.x, brick.y, brick.x, brick.y + brick.h);
  grad.addColorStop(0, brick.color);
  grad.addColorStop(1, darkenColor(brick.color, 0.6));

  ctx.fillStyle = grad;
  roundRect(ctx, brick.x, brick.y, brick.w, brick.h, 4);
  ctx.fill();

  // Highlight top
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  roundRect(ctx, brick.x + 2, brick.y + 1, brick.w - 4, brick.h / 3, 3);
  ctx.fill();

  // HP indicator for multi-hit bricks
  if (brick.maxHp > 1) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    roundRect(ctx, brick.x + 4, brick.y + brick.h / 2 - 6, brick.w - 8, 12, 3);
    ctx.fill();

    const hpRatio = brick.hp / brick.maxHp;
    const hpColor = hpRatio > 0.5 ? '#7bed9f' : (hpRatio > 0.25 ? '#ffa502' : '#ff6b6b');
    ctx.fillStyle = hpColor;
    roundRect(ctx, brick.x + 4, brick.y + brick.h / 2 - 6, (brick.w - 8) * hpRatio, 12, 3);
    ctx.fill();

    // HP text
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 9px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(brick.hp.toString(), brick.x + brick.w / 2, brick.y + brick.h / 2 + 3);
  }

  // Cracks for damaged bricks
  if (brick.hp < brick.maxHp && brick.maxHp > 1) {
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 1;
    const numCracks = brick.maxHp - brick.hp;
    for (let i = 0; i < numCracks; i++) {
      ctx.beginPath();
      const cx = brick.x + brick.w * (0.3 + Math.random() * 0.4);
      const cy = brick.y + brick.h * (0.2 + Math.random() * 0.6);
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + (Math.random() - 0.5) * 15, cy + (Math.random() - 0.5) * 10);
      ctx.stroke();
    }
  }

  if (brick.shakeTimer > 0) {
    ctx.restore();
  }

  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

function drawObstacles() {
  obstacles.forEach(obs => {
    ctx.fillStyle = obs.color;
    ctx.shadowColor = '#888';
    ctx.shadowBlur = 5;
    roundRect(ctx, obs.x, obs.y, obs.w, obs.h, 3);
    ctx.fill();

    // Stripe pattern
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    for (let y = obs.y; y < obs.y + obs.h; y += 8) {
      ctx.beginPath();
      ctx.moveTo(obs.x, y);
      ctx.lineTo(obs.x + obs.w, y);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
  });
}

function drawPowerups() {
  powerups.forEach(pu => {
    const bobY = Math.sin(pu.bobPhase) * 4;

    // Glow circle
    ctx.shadowColor = pu.color;
    ctx.shadowBlur = 15;
    ctx.strokeStyle = pu.color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(pu.x, pu.y + bobY, pu.size + 4, 0, Math.PI * 2);
    ctx.stroke();

    // Background circle
    ctx.fillStyle = pu.color + '33';
    ctx.beginPath();
    ctx.arc(pu.x, pu.y + bobY, pu.size + 4, 0, Math.PI * 2);
    ctx.fill();

    // Emoji
    ctx.shadowBlur = 0;
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(pu.emoji, pu.x, pu.y + bobY);
  });
}

function drawLasers() {
  lasers.forEach(laser => {
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur = 10;
    const grad = ctx.createLinearGradient(laser.x, laser.y, laser.x, laser.y + laser.h);
    grad.addColorStop(0, 'rgba(255,68,68,0.3)');
    grad.addColorStop(0.5, '#ff4444');
    grad.addColorStop(1, 'rgba(255,68,68,0.8)');
    ctx.fillStyle = grad;
    roundRect(ctx, laser.x - laser.w/2, laser.y, laser.w, laser.h, 1);
    ctx.fill();
    ctx.shadowBlur = 0;
  });
}

function drawHUD() {
  // Combo bar at top of canvas
  if (combo >= 3) {
    const comboWidth = Math.min(combo * 20, 800);
    const grad = ctx.createLinearGradient(0, 0, comboWidth, 0);
    grad.addColorStop(0, '#ffd700');
    grad.addColorStop(1, '#ff6bff');
    ctx.fillStyle = grad;
    ctx.fillRect((800 - comboWidth) / 2, 520 - 3, comboWidth, 3);

    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 10;
    ctx.fillRect((800 - comboWidth) / 2, 520 - 3, comboWidth, 3);
    ctx.shadowBlur = 0;
  }

  // Level progress
  const totalBricks = bricks.length + (currentLevel * 10 * 6 - bricks.length);
  if (totalBricks > 0) {
    const progress = 1 - bricks.length / Math.max(totalBricks, 1);
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    roundRect(ctx, 10, 513, 780, 4, 2);
    ctx.fill();

    const progGrad = ctx.createLinearGradient(10, 0, 10 + progress * 780, 0);
    progGrad.addColorStop(0, '#4facfe');
    progGrad.addColorStop(1, '#00f2fe');
    ctx.fillStyle = progGrad;
    roundRect(ctx, 10, 513, progress * 780, 4, 2);
    ctx.fill();
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function darkenColor(hex, factor) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgb(${Math.floor(r*factor)},${Math.floor(g*factor)},${Math.floor(b*factor)})`;
}

function render() {
  ctx.save();
  ctx.translate(screenShake.x || 0, screenShake.y || 0);

  drawBackground();

  if (gameState === 'playing' || gameState === 'paused') {
    // Draw bricks
    bricks.forEach(b => drawBrick(b));

    // Draw obstacles
    drawObstacles();

    // Draw powerups
    drawPowerups();

    // Draw lasers
    drawLasers();

    // Draw paddle
    drawPaddle();

    // Draw balls
    balls.forEach(b => drawBall(b));

    // Draw particles
    particles.draw(ctx);

    // HUD overlay on canvas
    drawHUD();
  } else if (gameState === 'levelTransition') {
    drawBackground();
    // Still show any remaining particles
    particles.update(0.016);
    particles.draw(ctx);
  }

  ctx.restore();
}

// ==================== GAME LOOP ====================
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  update(dt);
  render();

  requestAnimationFrame(gameLoop);
}

// ==================== INITIALIZATION ====================
document.getElementById('highScoreDisplay').textContent = highScore;
lastTime = performance.now();
requestAnimationFrame(gameLoop);
</script>
